name: Go Tests

on: [push]

permissions:
  contents: read

jobs:
  unitTests:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Go 1.25.x
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run tests
        run: go test -v ./...
