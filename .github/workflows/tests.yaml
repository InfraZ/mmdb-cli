name: Go Tests

on: [push]

permissions:
  contents: read

jobs:
  unitTests:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Go 1.26.x
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Show coverage
        run: go tool cover -func=coverage.out
